<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7fbf2" />
    <title>Bearクラス 進行タイマー</title>
    <link rel="stylesheet" href="./bear.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">
          <div class="logo">B</div>
          <div>
            <p class="k">Bear Class</p>
            <h1>懇親会 進行タイマー</h1>
          </div>
        </div>
        <div class="badge">v10 PDF</div>
      </header>
      <main>
        <section class="timer">
          <div class="top">
            <div>
              <p class="k">経過</p>
              <output id="clock" class="clock">0:00:00</output>
            </div>
            <div id="sec" class="sec">開始・注意事項</div>
          </div>
          <div class="bar"><i id="bar"></i></div>
          <div id="meta" class="meta"></div>
          <div class="controls">
            <button id="start" class="primary">▶ スタート</button>
            <button id="reset" class="danger">リセット</button>
          </div>
        </section>

        <section id="run" class="view on">
          <article class="card">
            <div class="head">
              <div>
                <p id="curSec" class="k">開始・注意事項</p>
                <h2 id="curLabel">0:00</h2>
              </div>
              <div class="head-right">
                <button id="q10" class="quiz10" hidden>🕰️10</button>
                <div id="lineRemain" class="line-remain">残り 0:00</div>
              </div>
            </div>
            <div class="block">
              <div class="bt">司会</div>
              <p id="host"></p>
            </div>
            <div id="supportBox" class="block support">
              <div class="bt">サポート係</div>
              <p id="support"></p>
            </div>
            <div id="memoBox" class="block memo" hidden>
              <div class="bt">メモ</div>
              <p id="memo"></p>
            </div>
          </article>
        </section>

        <section id="tl" class="view list"></section>
      </main>
      <footer class="bottom">
        <button id="prev">← 戻る</button>
        <button id="pos" class="pos" type="button">1 / 39</button>
        <button id="next">次へ →</button>
      </footer>
    </div>
    <script src="./bear.js"></script>
  </body>
</html>
